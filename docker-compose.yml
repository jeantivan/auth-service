version: "3.9"

services:
  db:
    image: postgres:16
    container_name: auth_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - auth_net

  migrator:
    build: ./docker/migrator
    container_name: auth_migrator
    depends_on:
      - db
    volumes:
      - ./db/migrations:/migrations
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - auth_net


  backend:
    build: ./docker/backend
    container_name: auth_backend
    depends_on:
      - migrator
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3000:3000"
    networks:
      - auth_net

volumes:
  db_data:

networks:
  auth_net:
